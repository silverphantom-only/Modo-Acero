<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Interactivo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .calendar-container { display: flex; flex-direction: column; gap: 10px; }
        .office-block { border: 1px solid #ccc; padding: 10px; margin: 5px 0; }
        .task { display: flex; align-items: center; gap: 10px; padding: 5px; cursor: pointer; }
        .done-task { text-decoration: line-through; opacity: 0.7; }
        .view-buttons { margin-bottom: 10px; }
        .progress { margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="view-buttons">
        <button onclick="setView('day')">Día</button>
        <button onclick="setView('week')">Semana</button>
        <button onclick="setView('month')">Mes</button>
    </div>
    <div id="calendar-container" class="calendar-container"></div>
    <script>
        let workQueue = JSON.parse(localStorage.getItem('workQueue')) || [];
        let workIndex = 0;
        let currentView = 'day';

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';

            let blocks = [];
            switch (currentView) {
                case 'day':
                    blocks = getDayBlocks();
                    break;
                case 'week':
                    blocks = getWeekBlocks();
                    break;
                case 'month':
                    blocks = getMonthBlocks();
                    break;
            }

            blocks.forEach((block, blockIndex) => {
                const blockElement = document.createElement('div');
                blockElement.className = 'office-block';

                block.tasks.forEach((task, taskIndex) => {
                    const taskElement = document.createElement('div');
                    taskElement.className = `task ${task.completed ? 'done-task' : ''}`;

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = task.completed;
                    checkbox.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleTask(blockIndex, taskIndex);
                    });

                    const title = document.createElement('span');
                    title.textContent = task.title;

                    taskElement.appendChild(checkbox);
                    taskElement.appendChild(title);
                    taskElement.addEventListener('click', () => checkbox.click());

                    blockElement.appendChild(taskElement);
                });

                container.appendChild(blockElement);
            });

            // Botón "+ Agregar"
            const addButton = document.createElement('button');
            addButton.textContent = '+ Agregar';
            addButton.addEventListener('click', addWork);
            container.appendChild(addButton);

            // Progreso
            const progress = document.createElement('div');
            const completed = workQueue.filter(t => t.completed).length;
            progress.className = 'progress';
            progress.textContent = `${completed}/${workQueue.length} completadas`;
            container.appendChild(progress);
        }

        function toggleTask(blockIndex, taskIndex) {
            const task = workQueue[workIndex];
            task.completed = !task.completed;
            localStorage.setItem('workQueue', JSON.stringify(workQueue));
            renderCalendar();
        }

        function addWork() {
            const newTask = { title: `Tarea ${workQueue.length + 1}`, completed: false };
            workQueue.push(newTask);
            localStorage.setItem('workQueue', JSON.stringify(workQueue));
            renderCalendar();
        }

        function setView(view) {
            currentView = view;
            renderCalendar();
        }

        // Funciones para obtener bloques según la vista (ejemplo simplificado)
        function getDayBlocks() {
            return [{ tasks: workQueue }];
        }

        function getWeekBlocks() {
            return [{ tasks: workQueue.slice(0, 7) }, { tasks: workQueue.slice(7) }];
        }

        function getMonthBlocks() {
            return [{ tasks: workQueue.slice(0, 15) }, { tasks: workQueue.slice(15) }];
        }

        // Inicializar
        renderCalendar();
    </script>
</body>
</html>
