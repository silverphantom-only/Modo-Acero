<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Acero Pro</title>

<style>
body{
    font-family: Arial;
    background:#0a0a0a;
    color:#fff;
    margin:0;
    padding:20px;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(45deg,#6a00ff,#0044ff);
    color:#fff;
}

.hour-row{
    display:flex;
    border-bottom:1px solid #222;
    padding:8px;
    cursor:pointer;
}

.hour-time{
    width:60px;
    color:#666;
}

.block{
    padding:6px;
    border-radius:6px;
    margin-bottom:4px;
    font-size:12px;
}

/* COLORES */
.blue{ background:#0044ff; }
.purple{ background:#6a00ff; }
.black{ background:#222; }

.month-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.day-cell{
    background:#111;
    border:1px solid #222;
    min-height:90px;
    padding:5px;
    cursor:pointer;
}

.day-cell:hover{
    background:#1a1a2e;
}

</style>
</head>

<body>

<h2>Modo Acero</h2>

<button onclick="setView('day')">Día</button>
<button onclick="setView('month')">Mes</button>

<h3 id="title"></h3>
<div id="calendar"></div>

<script>

/* ─── DATA ─── */
let tasksByDate = JSON.parse(localStorage.getItem('tasksByDate')) || {};
let currentView = "day";
let selectedDate = today();

function today(){
    return new Date().toISOString().split("T")[0];
}

function save(){
    localStorage.setItem("tasksByDate", JSON.stringify(tasksByDate));
}

/* ─── RENDER ─── */

function render(){
    const el=document.getElementById("calendar");
    el.innerHTML="";

    if(currentView==="month"){
        renderMonth(el);
    }else{
        renderDay(el);
    }
}

/* ─── DAY VIEW (BLOQUES) ─── */

function renderDay(container){
    document.getElementById("title").textContent=selectedDate;

    const events = tasksByDate[selectedDate] || [];

    for(let h=7;h<=22;h++){
        const hour = String(h).padStart(2,'0')+":00";

        const row=document.createElement("div");
        row.className="hour-row";

        const time=document.createElement("div");
        time.className="hour-time";
        time.textContent=hour;

        const content=document.createElement("div");
        content.style.flex=1;

        const event = events.find(e => hour >= e.start && hour < e.end);

        if(event){
            const block=document.createElement("div");
            block.className="block "+event.color;

            block.textContent = `${event.title} (${event.start}-${event.end})`;

            content.appendChild(block);
        }

        row.onclick=()=>{
            const title=prompt("Nombre del bloque");
            if(!title)return;

            const start=hour;
            const end=prompt("Hora fin (ej: 14:00)");
            if(!end)return;

            const color=prompt("Color: blue / purple / black");

            if(!tasksByDate[selectedDate]){
                tasksByDate[selectedDate]=[];
            }

            tasksByDate[selectedDate].push({
                start,
                end,
                title,
                color
            });

            save();
            render();
        };

        row.appendChild(time);
        row.appendChild(content);
        container.appendChild(row);
    }
}

/* ─── MONTH VIEW ─── */

function renderMonth(container){
    document.getElementById("title").textContent="Vista mensual";

    const grid=document.createElement("div");
    grid.className="month-grid";

    const now=new Date();
    const year=now.getFullYear();
    const month=now.getMonth();

    const total=new Date(year,month+1,0).getDate();

    for(let d=1;d<=total;d++){
        const dateKey=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        const cell=document.createElement("div");
        cell.className="day-cell";

        cell.innerHTML="<strong>"+d+"</strong>";

        const events = tasksByDate[dateKey] || [];

        events.slice(0,2).forEach(e=>{
            const div=document.createElement("div");
            div.textContent=e.title;
            div.style.fontSize="10px";
            cell.appendChild(div);
        });

        cell.onclick=()=>{
            selectedDate=dateKey;
            currentView="day";
            render();
        };

        grid.appendChild(cell);
    }

    container.appendChild(grid);
}

/* ─── NAV ─── */

function setView(v){
    currentView=v;
    render();
}

render();

</script>

</body>
</html>
