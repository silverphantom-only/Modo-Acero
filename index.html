<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Pro</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    margin: 0;
    padding: 20px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.view-buttons {
    margin-bottom: 10px;
}

/* DAY VIEW */
.hour-row {
    display: flex;
    border-bottom: 1px solid #333;
    padding: 6px;
    cursor: pointer;
}

.hour-time {
    width: 60px;
    color: #888;
}

.task {
    display: flex;
    gap: 10px;
}

.done-task {
    text-decoration: line-through;
    opacity: 0.5;
}

/* MONTH */
.month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.day-cell {
    border: 1px solid #333;
    min-height: 90px;
    padding: 5px;
    background: #1a1a1a;
    cursor: pointer;
}

.day-cell:hover {
    background: #222;
}
</style>
</head>

<body>

<div class="view-buttons">
    <button onclick="setView('day')">Día</button>
    <button onclick="setView('month')">Mes</button>
</div>

<h3 id="title"></h3>
<div id="calendar"></div>

<script>

let tasksByDate = JSON.parse(localStorage.getItem('tasksByDate')) || {};
let currentView = "day";
let selectedDate = today();

function today(){
    return new Date().toISOString().split("T")[0];
}

function save(){
    localStorage.setItem("tasksByDate", JSON.stringify(tasksByDate));
}

/* ───── RENDER ───── */

function render(){
    const el = document.getElementById("calendar");
    el.innerHTML = "";

    if(currentView === "month"){
        renderMonth(el);
    } else {
        renderDay(el);
    }
}

/* ───── DAY (HORAS) ───── */

function renderDay(container){
    document.getElementById("title").textContent = selectedDate;

    const tasks = tasksByDate[selectedDate] || [];

    for(let h=7; h<=22; h++){
        const hour = String(h).padStart(2,'0')+":00";

        const row = document.createElement("div");
        row.className = "hour-row";

        const time = document.createElement("div");
        time.className = "hour-time";
        time.textContent = hour;

        const content = document.createElement("div");

        const task = tasks.find(t=>t.time === hour);

        if(task){
            const taskEl = document.createElement("div");
            taskEl.className = "task " + (task.completed ? "done-task" : "");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = task.completed;

            checkbox.onclick = (e)=>{
                e.stopPropagation();
                task.completed = !task.completed;
                save();
                render();
            };

            const text = document.createElement("span");
            text.textContent = task.title;

            taskEl.appendChild(checkbox);
            taskEl.appendChild(text);

            content.appendChild(taskEl);
        }

        row.onclick = ()=>{
            const title = prompt("Tarea para "+hour);
            if(!title) return;

            if(!tasksByDate[selectedDate]){
                tasksByDate[selectedDate] = [];
            }

            tasksByDate[selectedDate].push({
                time: hour,
                title,
                completed:false
            });

            save();
            render();
        };

        row.appendChild(time);
        row.appendChild(content);
        container.appendChild(row);
    }
}

/* ───── MONTH ───── */

function renderMonth(container){
    document.getElementById("title").textContent = "Vista mensual";

    const grid = document.createElement("div");
    grid.className = "month-grid";

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const totalDays = new Date(year, month+1, 0).getDate();

    for(let d=1; d<=totalDays; d++){
        const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        const cell = document.createElement("div");
        cell.className = "day-cell";

        cell.innerHTML = "<strong>"+d+"</strong>";

        const tasks = tasksByDate[dateKey] || [];

        tasks.slice(0,2).forEach(t=>{
            const div = document.createElement("div");
            div.textContent = t.time+" "+t.title;
            div.style.fontSize = "10px";
            cell.appendChild(div);
        });

        cell.onclick = ()=>{
            selectedDate = dateKey;
            currentView = "day";
            render();
        };

        grid.appendChild(cell);
    }

    container.appendChild(grid);
}

/* ───── NAV ───── */

function setView(v){
    currentView = v;
    render();
}

render();

</script>

</body>
</html>
