<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Pro</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    margin: 0;
    padding: 20px;
}

.view-buttons {
    margin-bottom: 15px;
}

button {
    padding: 8px 12px;
    margin-right: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.task {
    display: flex;
    gap: 10px;
    padding: 8px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}

.done-task {
    text-decoration: line-through;
    opacity: 0.5;
}

.progress {
    margin-top: 10px;
    font-size: 13px;
}

/* 🔥 MONTH GRID */
.month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.day-cell {
    border: 1px solid #333;
    min-height: 90px;
    padding: 5px;
    font-size: 12px;
    cursor: pointer;
    background: #1a1a1a;
}

.day-cell:hover {
    background: #222;
}
</style>
</head>

<body>

<div class="view-buttons">
    <button onclick="setView('day')">Día</button>
    <button onclick="setView('month')">Mes</button>
</div>

<h3 id="currentDate"></h3>

<div id="calendar-container"></div>

<script>

let tasksByDate = JSON.parse(localStorage.getItem('tasksByDate')) || {};
let currentView = 'day';
let selectedDate = getToday();

function getToday(){
    return new Date().toISOString().split('T')[0];
}

function save(){
    localStorage.setItem('tasksByDate', JSON.stringify(tasksByDate));
}

function formatDate(date){
    return new Date(date).toLocaleDateString('es-MX',{
        weekday:'long', year:'numeric', month:'long', day:'numeric'
    });
}

function renderCalendar(){
    const container = document.getElementById('calendar-container');
    const title = document.getElementById('currentDate');
    container.innerHTML = '';

    if(currentView === 'month'){
        title.textContent = "Vista mensual";
        renderMonth(container);
        return;
    }

    title.textContent = formatDate(selectedDate);

    const tasks = tasksByDate[selectedDate] || [];

    tasks.forEach((task, i) => {
        const el = document.createElement('div');
        el.className = `task ${task.completed ? 'done-task' : ''}`;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.completed;

        checkbox.onclick = (e)=>{
            e.stopPropagation();
            toggleTask(i);
        };

        const text = document.createElement('span');
        text.textContent = task.title;

        el.appendChild(checkbox);
        el.appendChild(text);

        el.onclick = () => checkbox.click();

        container.appendChild(el);
    });

    const btn = document.createElement('button');
    btn.textContent = '+ Agregar tarea';
    btn.onclick = addWork;
    container.appendChild(btn);

    const completed = tasks.filter(t=>t.completed).length;
    const prog = document.createElement('div');
    prog.className = 'progress';
    prog.textContent = `${completed}/${tasks.length} completadas`;
    container.appendChild(prog);
}

function toggleTask(index){
    const tasks = tasksByDate[selectedDate] || [];
    tasks[index].completed = !tasks[index].completed;
    save();
    renderCalendar();
}

function addWork(){
    const title = prompt("Nueva tarea");
    if(!title) return;

    if(!tasksByDate[selectedDate]){
        tasksByDate[selectedDate] = [];
    }

    tasksByDate[selectedDate].push({
        title,
        completed:false
    });

    save();
    renderCalendar();
}

function setView(view){
    currentView = view;
    renderCalendar();
}

function openDay(date){
    selectedDate = date;
    currentView = 'day';
    renderCalendar();
}

function renderMonth(container){
    const grid = document.createElement('div');
    grid.className = 'month-grid';

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const totalDays = new Date(year, month+1, 0).getDate();

    for(let d=1; d<=totalDays; d++){
        const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const cell = document.createElement('div');
        cell.className = 'day-cell';

        cell.innerHTML = `<strong>${d}</strong>`;

        const tasks = tasksByDate[dateKey] || [];

        tasks.slice(0,2).forEach(t=>{
            const div = document.createElement('div');
            div.textContent = t.title;
            div.style.fontSize = "10px";
            cell.appendChild(div);
        });

        cell.onclick = ()=>openDay(dateKey);

        grid.appendChild(cell);
    }

    container.appendChild(grid);
}

renderCalendar();

</script>

</body>
</html>
